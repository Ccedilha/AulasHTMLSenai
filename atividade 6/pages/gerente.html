<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema - Gerente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="container p-5">
    <main>
        <h1>Sua página de GERENTE</h1>
        <form>
            <h2>Cadastro de funcionario novo:</h2>
            <div class="mb-3">
                <label class="form-label" for="nome-funcionario">Digite o nome do funcionário:</label>
                <input class="form-control p-3" type="text" id="nome-funcionario" placeholder="Ex: João" required>
            </div>
            <div class="mb-3">
                <p>Horário de trabalho</p>
                <select name="periodo" id="horas-funcionario">
                    <option id="horas-cargo" value="20">20h semanais</option>
                    <option id="horas-cargo" value="30">30h semanais</option>
                    <option id="horas-cargo" value="40">40h semanais</option>
                </select>
            </div>
            <br>
            <div class="mb-3">
                <label class="form-label" for="cargo-funcionario">Digite o cargo do funcionário:</label>
                <input class="form-control p-3" type="text" id="cargo-funcionario" placeholder="Ex: Desenvolvedor" required>
            </div>
            <br>
            <button
                type="button"
                onclick="cadastrarFuncionario()"
                >
                CADASTRAR FUNCIONARIO
            </button>
            <script src="../js/cadastroFuncionario.js"></script>
        </form>
    </main>
     <footer>
            <a class="mb-3" href="funcionario.html">Ir para a página de funcionários</a>
        </footer>
</body>

</html>
