<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; connect-src 'self' http://127.0.0.1:5500 ws://127.0.0.1:5500; script-src 'self'; img-src 'self'; style-src 'self';">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste com JS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="container p-5">
    <main>
        <h1>Testes  JavaScript</h1>
        <div class="container">
            <form>

                <div class="mb-3">
                    <label class="form-label" for="nome">Digite seu nome:</label>
                    <input class="form-control p-3" type="text" id="nome">
                </div>

                <div class="mb-3">
                    <label class="form-label" for="idade">Digite sua idade:</label>
                    <input class="form-control p-3" type="number" id="idade">
                </div>

                <div class="mb-3">
                    <label class="form-label" for="cargo">Cargo:</label>
                    <input class="form-control p-3" type="text" id="cargo">
                </div>

                <div class="mb3 form check">
                    <input class="form-check-input" type="checkbox" id="temAcessoRestrito">
                    <label class="form-check-label" for="temAcessoRestrito">Tem Acesso Restrito?</label>
                </div class="mb-3">

                <button type="button" class="btn btn-primary" onclick="imprimirNome()">Enviar dados</button>

            </form>
            <script src="formulario.js"></script>
        </div>
    </main>
</body>

</html>
