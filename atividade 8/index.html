<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste funções</title>
</head>
<body>
    <main>
        <h1>Teste de funções matemáticas</h1>
        <h2>Soma</h2>
        <label for="num1">Digite o primeiro número</label>
        <input type="text" id="num1">

        <br>
        <label for="num2">Digite o segundo número</label>
        <input type="text" id="num2">

        <br>
        <button onclick="soma()">SOMA</button>
        <button onclick="subtracao()">SUBTRAÇÃO</button>
        <button onclick="multiplicacao()">MULTIPLICAÇÃO</button>
        <button onclick="divisao()">DIVISÃO</button>
        <br>
        <p>Seu resultado é: <strong id="resultado"></strong></p>
        <br>
        <label for="num3">Digite o valor do produto em dólares (USD)</label>
        <input type="text" id="num3">
        <br>
        <button onclick="impostron2000()">Cálculo importação</button>
        <br>
        <p>O valor total será: <strong id="resultadoImposto"></strong></p>

    </main>
    <footer>
        <button onclick="apagarLocalStorage()">Apagar histórico</button>
    </footer>
    <script src="js/funcoesMatematicas.js"></script>
</body>
</html>
